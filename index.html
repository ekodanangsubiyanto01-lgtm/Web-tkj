<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKO — Futuristic Developer Portfolio</title>
    <style>
        /* 1. Global & Accessibility Optimizations */
        html {
            scroll-behavior: smooth;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #060911;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Custom Neon Cursor Glow */
        .cursor-glow {
            width: 25px;
            height: 25px;
            background: rgba(0, 210, 255, 0.4);
            border: 1px solid rgba(0, 210, 255, 0.8);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
        }

        .cursor-hover {
            width: 45px;
            height: 45px;
            background: rgba(255, 51, 102, 0.2);
            border-color: rgba(255, 51, 102, 0.8);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.6);
        }

        /* 2. Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #060911;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-eagle {
            width: 80px;
            height: 80px;
            animation: loaderPulse 1.2s infinite alternate ease-in-out;
        }

        @keyframes loaderPulse {
            0% { transform: scale(0.9); opacity: 0.4; }
            100% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 15px #00d2ff); }
        }

        /* 3. Hero Section & Aurora Background */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0d1726 0%, #060911 100%);
            overflow: hidden;
        }

        .hero::before, .hero::after {
            content: '';
            position: absolute;
            width: 40vw;
            height: 40vw;
            max-width: 450px;
            max-height: 450px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.22;
            z-index: 0;
            pointer-events: none;
            animation: floatGlow 12s infinite alternate ease-in-out;
        }

        .hero::before { background: #00d2ff; top: 10%; left: 10%; }
        .hero::after { background: #ff3366; bottom: 10%; right: 10%; animation-delay: -6s; }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.15); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 4. Staggered Animations */
        .fade-element {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 5. Eagle SVG Graphic */
        .eagle-container {
            width: clamp(200px, 25vw, 280px);
            height: clamp(200px, 25vw, 280px);
            margin-bottom: 1.5rem;
            position: relative;
            filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.35));
            transition: transform 0.1s ease-out, filter 0.4s ease;
            cursor: pointer;
        }

        .eagle-container:hover {
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.7));
        }

        .eagle-svg { width: 100%; height: 100%; }

        .eagle-eye {
            fill: #00f0ff;
            filter: drop-shadow(0 0 8px #00f0ff);
            animation: pulseEye 2s infinite alternate;
        }

        @keyframes pulseEye {
            0% { fill: #00f0ff; filter: drop-shadow(0 0 4px #00f0ff); }
            100% { fill: #ff3366; filter: drop-shadow(0 0 15px #ff3366); }
        }

        /* 6. Typography with Responsive Clamp */
        .hero-title {
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 30%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.25);
        }

        .hero-subtitle {
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            color: #a0aec0;
            max-width: 620px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            padding: 0 1rem;
        }

        /* 7. CTA Button with Glassmorphism & Accessibility Focus */
        .btn-explore {
            padding: 0.9rem 2.8rem;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            background: rgba(0, 210, 255, 0.12);
            border: 1px solid rgba(0, 210, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
            text-decoration: none;
            display: inline-block;
        }

        .btn-explore:hover {
            background: rgba(0, 210, 255, 1);
            color: #060911;
            box-shadow: 0 0 35px rgba(0, 210, 255, 0.8);
            transform: translateY(-3px);
        }

        .btn-explore:focus-visible {
            outline: 3px solid #00d2ff;
            outline-offset: 5px;
        }

        /* 8. Scroll Indicator */
        .scroll-down {
            position: absolute;
            bottom: 25px;
            z-index: 2;
            color: #00d2ff;
            font-size: 1.5rem;
            text-decoration: none;
            opacity: 0.8;
            animation: bounce 2s infinite;
            transition: color 0.3s ease;
        }

        .scroll-down:hover { color: #ffffff; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Section Target Dummy */
        #portfolio {
            min-height: 100vh;
            background-color: #04060c;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="cursor-glow" id="cursor"></div>

    <div id="loader">
        <svg class="loader-eagle" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <polygon points="100,30 140,80 100,160 60,80" fill="none" stroke="#00d2ff" stroke-width="3"/>
            <polygon points="100,50 120,80 100,120 80,80" fill="#00d2ff"/>
        </svg>
    </div>

    <section class="hero">
        <div class="hero-content">
            <div class="eagle-container fade-element delay-1" id="eagle">
                <svg class="eagle-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 20 120 L 60 70 L 100 95 L 140 70 L 180 120 L 100 150 Z" fill="none" stroke="rgba(0, 210, 255, 0.25)" stroke-width="1.5"/>
                    <path d="M 40 100 L 75 60 L 100 80 L 125 60 L 160 100" fill="none" stroke="rgba(0, 210, 255, 0.4)" stroke-width="1"/>
                    
                    <polygon points="100,20 155,50 165,95 145,130 100,145 55,130 35,95 45,50" fill="#0b1320" stroke="#00d2ff" stroke-width="2"/>
                    
                    <polygon points="140,85 188,98 140,112 135,98" fill="#ffb703" stroke="#ffa000" stroke-width="1"/>
                    
                    <polyline points="105,62 142,72 120,74" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
                    
                    <polygon points="115,75 138,78 122,86" class="eagle-eye"/>
                </svg>
            </div>

            <h1 class="hero-title fade-element delay-2">Selamat Datang</h1>
            <p class="hero-subtitle fade-element delay-3">
                Website Portofolio Eko — Menghadirkan solusi digital modern dengan presisi tinggi, performa optimal, dan visi masa depan.
            </p>
            
            <a href="#portfolio" class="btn-explore fade-element delay-4 interactive">Jelajahi Karya</a>
        </div>

        <a href="#portfolio" class="scroll-down fade-element delay-4 interactive" title="Scroll ke bawah">&#9660;</a>
    </section>

    <section id="portfolio">
        <h2 style="color: #a0aec0; font-weight: 400;">— Bagian Portofolio —</h2>
    </section>

    <script>
        // 1. Loading Screen Controller
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 1200);
        });

        // 2. Cursor Glow & Hover Scale Effect
        const cursor = document.getElementById('cursor');
        const interactiveElements = document.querySelectorAll('.interactive, .eagle-container');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = `${e.clientX}px`;
            cursor.style.top = `${e.clientY}px`;
        });

        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
        });

        // 3. Mouse Parallax Effect for Eagle SVG
        const eagle = document.getElementById('eagle');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 35;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 35;
            eagle.style.transform = `translate(${xAxis}px, ${yAxis}px) rotate(${xAxis * 0.1}deg)`;
        });
    </script>
</body>
</html>
