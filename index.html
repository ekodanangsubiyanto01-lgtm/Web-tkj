<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Eagle - Hybrid Ultimate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #020408; font-family: sans-serif; }
    #webgl { width: 100%; height: 100%; display: block; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #020408; color: #00ffff; display: flex; justify-content: center;
      align-items: center; font-size: 1.2rem; letter-spacing: 4px; z-index: 9999;
      transition: opacity 0.8s ease;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

  <div id="loading">INITIALIZING CYBER HYBRID...</div>
  <canvas id="webgl"></canvas>

  <script>
    // ===================================
    // 1. SETUP SCENE & RENDERER
    // ===================================
    const canvas = document.getElementById("webgl");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020408);
    scene.fog = new THREE.FogExp2(0x020408, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 20);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;

    // ===================================
    // 2. BLOOM EFFECT (POST-PROCESSING)
    // ===================================
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      2.0,  // Bloom Strength (Intensitas Cahaya Menyala)
      0.5,  // Radius
      0.15  // Threshold
    );

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // ===================================
    // 3. LIGHTING
    // ===================================
    scene.add(new THREE.AmbientLight(0x335577, 1.5));

    const keyLight = new THREE.DirectionalLight(0xffffff, 3);
    keyLight.position.set(10, 15, 10);
    scene.add(keyLight);

    const rimLight = new THREE.PointLight(0x00ffff, 5, 30);
    rimLight.position.set(-12, 8, -10);
    scene.add(rimLight);

    // ===================================
    // 4. MATERIALS & MESH (ELANG RAKITAN)
    // ===================================
    const armorMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x081421, metalness: 0.9, roughness: 0.2, clearcoat: 1
    });

    const cyanMaterial = new THREE.MeshStandardMaterial({
      color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 4
    });

    const eyeMaterial = new THREE.MeshStandardMaterial({
      color: 0xff0033, emissive: 0xff0033, emissiveIntensity: 6
    });

    const birdGroup = new THREE.Group();
    scene.add(birdGroup);

    // Chest & Energy Core
    const chest = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), armorMaterial);
    chest.scale.set(1, 1.3, 1.4);
    birdGroup.add(chest);

    const core = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4, 16), cyanMaterial);
    core.position.z = 1.1;
    birdGroup.add(core);

    // Head
    const headGroup = new THREE.Group();
    headGroup.position.set(0, 2.5, 0.5);
    birdGroup.add(headGroup);

    const skull = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), armorMaterial);
    skull.scale.set(1, 0.9, 1.3);
    headGroup.add(skull);

    const beak = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.8, 4), armorMaterial);
    beak.rotation.x = -Math.PI / 2;
    beak.position.set(0, -0.2, 1.4);
    headGroup.add(beak);

    const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const leftEye = new THREE.Mesh(eyeGeo, eyeMaterial);
    leftEye.position.set(-0.4, 0.2, 0.9);
    headGroup.add(leftEye);

    const rightEye = new THREE.Mesh(eyeGeo, eyeMaterial);
    rightEye.position.set(0.4, 0.2, 0.9);
    headGroup.add(rightEye);

    // Wings
    const leftWing = new THREE.Group();
    leftWing.position.set(-1.8, 1, 0);
    birdGroup.add(leftWing);

    const rightWing = new THREE.Group();
    rightWing.position.set(1.8, 1, 0);
    birdGroup.add(rightWing);

    for (let i = 0; i < 12; i++) {
      const fLeft = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.5 - i * 0.1, 0.05), armorMaterial);
      fLeft.position.set(-i * 0.3, -i * 0.1, 0);
      fLeft.rotation.z = 0.6 + i * 0.03;
      leftWing.add(fLeft);

      const fRight = new THREE.Mesh(new THREE.BoxGeometry(0.15, 3.5 - i * 0.1, 0.05), armorMaterial);
      fRight.position.set(i * 0.3, -i * 0.1, 0);
      fRight.rotation.z = -0.6 - i * 0.03;
      rightWing.add(fRight);
    }

    // Particles Atmosphere
    const pGeo = new THREE.BufferGeometry();
    const pCount = 1200;
    const pos = new Float32Array(pCount * 3);
    for (let i = 0; i < pCount * 3; i++) pos[i] = (Math.random() - 0.5) * 50;
    pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.05, color: 0x00ffff }));
    scene.add(particles);

    // ===================================
    // 5. ANIMATION & RENDER LOOP
    // ===================================
    const clock = new THREE.Clock();

    // Intro Animation via GSAP
    gsap.to('#loading', { opacity: 0, duration: 1, delay: 0.5, onComplete: () => document.getElementById('loading').remove() });

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Wing Flap Motion
      leftWing.rotation.z = Math.sin(t * 3) * 0.3 + 0.2;
      rightWing.rotation.z = -Math.sin(t * 3) * 0.3 - 0.2;

      // Floating Body
      birdGroup.position.y = Math.sin(t * 1.5) * 0.4;

      // Cinematic Camera Orbit
      camera.position.x = Math.sin(t * 0.2) * 16;
      camera.position.z = Math.cos(t * 0.2) * 16;
      camera.position.y = 2 + Math.sin(t * 0.3) * 2;
      camera.lookAt(birdGroup.position);

      particles.rotation.y = t * 0.01;

      // Render Post-Processing Composer (Bloom)
      composer.render();
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
