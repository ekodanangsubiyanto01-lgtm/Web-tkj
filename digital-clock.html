<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .clock-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .city-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-name {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .time-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .date-display {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .control-panel h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6f 100%);
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        .btn.active {
            background: linear-gradient(135deg, #ff006f 0%, #cc0055 100%);
            color: #fff;
        }

        .time-format-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .format-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .format-btn.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: rgba(0, 255, 136, 0.6);
            color: #00ff88;
        }

        .format-btn:hover {
            border-color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .time-display {
                font-size: 2rem;
            }
        }

        .blink {
            animation: blink-animation 1s infinite;
        }

        @keyframes blink-animation {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⏰ Global Time Zone Clock</h1>
        <p>Lihat waktu saat ini di berbagai kota di seluruh dunia</p>
    </div>

    <div class="clocks-grid" id="clocksContainer">
        <!-- Clock cards will be generated here by JavaScript -->
    </div>

    <div class="control-panel">
        <h2>⚙️ Pengaturan</h2>
        <div class="toggle-group">
            <button class="btn active" onclick="toggleSeconds()">Tampilkan Detik</button>
            <button class="btn" onclick="toggleAnalog()">Tampilkan Jam Analog</button>
            <button class="btn" onclick="addRandomCity()">+ Tambah Kota</button>
            <button class="btn" onclick="resetClocks()">Reset ke Default</button>
        </div>
        <div class="time-format-group">
            <button class="format-btn active" onclick="setTimeFormat('24')">24 Jam</button>
            <button class="format-btn" onclick="setTimeFormat('12')">12 Jam (AM/PM)</button>
        </div>
    </div>
</div>

<script>
    // Timezone data
    const timezones = [
        { city: 'Jakarta', timezone: 'Asia/Jakarta', country: 'Indonesia' },
        { city: 'Bangkok', timezone: 'Asia/Bangkok', country: 'Thailand' },
        { city: 'Singapore', timezone: 'Asia/Singapore', country: 'Singapore' },
        { city: 'Tokyo', timezone: 'Asia/Tokyo', country: 'Japan' },
        { city: 'Shanghai', timezone: 'Asia/Shanghai', country: 'China' },
        { city: 'Hong Kong', timezone: 'Asia/Hong_Kong', country: 'Hong Kong' },
        { city: 'Dubai', timezone: 'Asia/Dubai', country: 'UAE' },
        { city: 'London', timezone: 'Europe/London', country: 'UK' },
        { city: 'Paris', timezone: 'Europe/Paris', country: 'France' },
        { city: 'New York', timezone: 'America/New_York', country: 'USA' },
        { city: 'Los Angeles', timezone: 'America/Los_Angeles', country: 'USA' },
        { city: 'Sydney', timezone: 'Australia/Sydney', country: 'Australia' },
        { city: 'Auckland', timezone: 'Pacific/Auckland', country: 'New Zealand' },
        { city: 'Toronto', timezone: 'America/Toronto', country: 'Canada' },
        { city: 'São Paulo', timezone: 'America/Sao_Paulo', country: 'Brazil' },
        { city: 'Moscow', timezone: 'Europe/Moscow', country: 'Russia' },
        { city: 'Istanbul', timezone: 'Europe/Istanbul', country: 'Turkey' },
        { city: 'Mumbai', timezone: 'Asia/Kolkata', country: 'India' },
        { city: 'Seoul', timezone: 'Asia/Seoul', country: 'South Korea' },
        { city: 'Bangkok', timezone: 'Asia/Bangkok', country: 'Thailand' },
    ];

    let selectedCities = [
        'Jakarta', 'Bangkok', 'Tokyo', 'London', 'New York', 'Sydney'
    ];
    let showSeconds = true;
    let showAnalog = false;
    let timeFormat = '24'; // '24' or '12'

    // Initialize
    function init() {
        renderClocks();
        updateTime();
        setInterval(updateTime, 1000);
    }

    function renderClocks() {
        const container = document.getElementById('clocksContainer');
        container.innerHTML = '';

        selectedCities.forEach(cityName => {
            const tzData = timezones.find(tz => tz.city === cityName);
            if (!tzData) return;

            const card = document.createElement('div');
            card.className = 'clock-card';
            card.innerHTML = `
                <div class="city-name">${tzData.city}</div>
                <div class="timezone-name">${tzData.timezone}</div>
                <div class="time-display" data-city="${cityName}">--:--:--</div>
                <div class="date-display" data-date="${cityName}">--/--/----</div>
            `;
            container.appendChild(card);
        });
    }

    function updateTime() {
        selectedCities.forEach(cityName => {
            const tzData = timezones.find(tz => tz.city === cityName);
            if (!tzData) return;

            const formatter = new Intl.DateTimeFormat('id-ID', {
                timeZone: tzData.timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour12: timeFormat === '12'
            });

            const now = new Date();
            const parts = formatter.formatToParts(now);
            
            let time = '';
            let date = '';

            // Build time
            const hour = parts.find(p => p.type === 'hour').value;
            const minute = parts.find(p => p.type === 'minute').value;
            const second = parts.find(p => p.type === 'second').value;

            if (timeFormat === '24') {
                time = `${hour}:${minute}`;
            } else {
                const period = parts.find(p => p.type === 'dayPeriod')?.value || '';
                time = `${hour}:${minute} ${period}`;
            }

            if (showSeconds) {
                time += `:${second}`;
            }

            // Build date
            const day = parts.find(p => p.type === 'day').value;
            const month = parts.find(p => p.type === 'month').value;
            const year = parts.find(p => p.type === 'year').value;
            date = `${day}/${month}/${year}`;

            // Update DOM
            const timeEl = document.querySelector(`[data-city="${cityName}"]`);
            const dateEl = document.querySelector(`[data-date="${cityName}"]`);
            
            if (timeEl) timeEl.textContent = time;
            if (dateEl) dateEl.textContent = date;
        });
    }

    function toggleSeconds() {
        showSeconds = !showSeconds;
        updateTime();
    }

    function toggleAnalog() {
        showAnalog = !showAnalog;
        alert(showAnalog ? 'Fitur analog clock akan segera ditambahkan!' : 'Tampilan digital');
    }

    function setTimeFormat(format) {
        timeFormat = format;
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        updateTime();
    }

    function addRandomCity() {
        const availableCities = timezones.filter(tz => !selectedCities.includes(tz.city));
        if (availableCities.length > 0) {
            const random = availableCities[Math.floor(Math.random() * availableCities.length)];
            selectedCities.push(random.city);
            renderClocks();
            updateTime();
        } else {
            alert('Semua kota sudah ditampilkan!');
        }
    }

    function resetClocks() {
        selectedCities = [
            'Jakarta', 'Bangkok', 'Tokyo', 'London', 'New York', 'Sydney'
        ];
        timeFormat = '24';
        showSeconds = true;
        document.querySelectorAll('.format-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === 0);
        });
        renderClocks();
        updateTime();
    }

    // Start the clock
    init();
</script>

</body>
</html>
